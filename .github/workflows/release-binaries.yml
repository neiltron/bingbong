name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (for metadata only)"
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version parity
        env:
          WORKFLOW_INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ -z "$TAG" ]]; then
            TAG="${WORKFLOW_INPUT_VERSION:-}"
          fi
          scripts/check-version-parity.sh "$TAG"

      - name: Build standalone binaries
        run: |
          mkdir -p dist/release

          bun build ./packages/cli/bin/cli.ts --compile --target=bun-darwin-x64 --outfile dist/release/bingbong-darwin-x64/bingbong
          bun build ./packages/cli/bin/cli.ts --compile --target=bun-darwin-arm64 --outfile dist/release/bingbong-darwin-arm64/bingbong
          bun build ./packages/cli/bin/cli.ts --compile --target=bun-linux-x64 --outfile dist/release/bingbong-linux-x64/bingbong

      - name: Package release archives
        run: |
          set -euo pipefail

          for target in bingbong-darwin-x64 bingbong-darwin-arm64 bingbong-linux-x64; do
            stage="dist/release/${target}"
            chmod +x "${stage}/bingbong"
            tar -C "${stage}" -czf "dist/release/${target}.tar.gz" bingbong
          done

          (cd dist/release && shasum -a 256 bingbong-*.tar.gz > checksums.txt)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: bingbong-release-bundles
          path: |
            dist/release/bingbong-darwin-x64.tar.gz
            dist/release/bingbong-darwin-arm64.tar.gz
            dist/release/bingbong-linux-x64.tar.gz
            dist/release/checksums.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/release/bingbong-darwin-x64.tar.gz
            dist/release/bingbong-darwin-arm64.tar.gz
            dist/release/bingbong-linux-x64.tar.gz
            dist/release/checksums.txt
